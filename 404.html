<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Mega-Barto</title>
    <script type="text/javascript">
      // Evitar redireccionamiento si ya estamos en la página principal con el parámetro path
      if (window.location.search.includes('?path=')) {
        window.location.href = window.location.origin;
      } else {
        // Configuración de redirección para SPA en GitHub Pages
        var segmentCount = 0;
        // Si es un sitio de proyecto (username.github.io/repo), segmentCount = 1
        var l = window.location;
        
        // Solo redirigir si no estamos en la raíz
        if (l.pathname !== '/' && !l.pathname.includes('/index.html')) {
          l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?path=' +
            l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
          );
        }
      }
    </script>
  </head>
  <body>
    Redireccionando...
  </body>
</html>

name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install RenderCV
      run: pip install "rendercv[full]"

    - name: Install Typst
      run: |
        curl -fsSL https://github.com/typst/typst/releases/download/v0.13.1/typst-x86_64-unknown-linux-musl.tar.xz -o typst.tar.xz
        tar -xf typst.tar.xz
        sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/

    - name: Generate CV PDFs
      working-directory: src/content/renderCV
      run: |
        rendercv render JAPB_CV.yaml
        rendercv render JAPB_CV_es.yaml

    - name: Copy CV to public
      run: |
        cp src/content/renderCV/rendercv_output/Juan_Alejandro_Pérez_Bermúdez_CV.pdf public/
        cp src/content/renderCV/rendercv_output/Juan_Alejandro_Pérez_Bermúdez_CV_es.pdf public/

    - name: Lint (Biome)
      run: bun run lint

    - name: Type-check (Astro)
      run: bun run check

    - name: Build
      run: bun run build

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
        cname: megabarto.com
